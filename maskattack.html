<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WGSL MD5</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 1rem;
      background: #f0f0f0;
    }
    .row {
      margin-bottom: 0.5rem;
    }
    label {
      display: inline-block;
      width: 170px;
      font-weight: bold;
    }
    input[type="text"],
    input[type="number"] {
      width: 300px;
      margin-bottom: 0.3rem;
      padding: 0.3rem;
      font-family: monospace;
    }
    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      cursor: pointer;
    }
    #logArea {
      width: 90%;
      height: 220px;
      margin-top: 1rem;
      font-family: monospace;
    }
  </style>
</head>
<body>

<h1>WGSL MD5</h1>

<div class="row">
  <label>MD5 Hash (hex):</label>
  <input id="hashInput" type="text" value="cb4932aabbf1d82ce88208d402a8219e" />
</div>

<div class="row">
  <label>Character Set:</label>
  <input id="charSetInput" type="text" value="abcdefghijklmnopqrstuvwxyz0123456789" />
</div>

<div class="row">
  <div style="display: inline-block; margin-right: 20px;">
    <label style="width: 100px;">Min Length:</label>
    <input id="minLenInput" type="number" value="1" style="width: 80px;" />
  </div>
  <div style="display: inline-block;">
    <label style="width: 100px;">Max Length:</label>
    <input id="maxLenInput" type="number" value="7" style="width: 80px;" />
  </div>
</div>

<div class="row">
  <button id="startBtn">Start</button>
</div>

<textarea id="logArea" readonly></textarea>

<script type="module">
function logMsg(msg) {
  console.log(msg);
  const area = document.getElementById("logArea");
  area.value += msg + "\n";
  area.scrollTop = area.scrollHeight;
}

function checkWebGPU() {
  if (!('gpu' in navigator)) {
    throw new Error("WebGPU is not supported in this browser.");
  }
}

const prefixMaskWGSL = `
struct Config {
  prefixLength   : u32,
  totalLength    : u32,
  suffixRange    : u32,
  charSetLength  : u32,

  dispatchWidth  : u32,
  rowStart       : u32,
  spare1         : u32,
  spare2         : u32,
}

struct FoundIndexAtomic {
  value : atomic<u32>,
}

struct ExpectedMD5 {
  hash : array<u32, 4>,
}

// Bindings
@group(0) @binding(0) var<storage> globalCharSet : array<u32>;
@group(0) @binding(1) var<storage> prefixChars : array<u32>;
@group(0) @binding(2) var<storage> expectedBuffer : ExpectedMD5;
@group(0) @binding(3) var<uniform> config : Config;
@group(0) @binding(4) var<storage, read_write> foundIndexAtomic : FoundIndexAtomic;

var<workgroup> sharedCharset : array<u32,256>;

fn loadFound() -> u32 {
  return atomicLoad(&foundIndexAtomic.value);
}
fn storeFound(val : u32) {
  atomicStore(&foundIndexAtomic.value, val);
}
fn atomicMinU32(candidate : u32) {
  loop {
    let oldVal = loadFound();
    if (candidate >= oldVal) {
      return;
    }
    storeFound(candidate);
    let newVal = loadFound();
    if (newVal == candidate) {
      return;
    }
  }
}

// -- MD5 HELPER FUNCTIONS
fn F(x : u32, y : u32, z : u32) -> u32 {
  return (x & y) | ((~x) & z);
}
fn G(x : u32, y : u32, z : u32) -> u32 {
  return (x & z) | (y & (~z));
}
fn H(x : u32, y : u32, z : u32) -> u32 {
  return x ^ y ^ z;
}
fn I(x : u32, y : u32, z : u32) -> u32 {
  return y ^ (x | (~z));
}
fn rotateLeft(x : u32, n : u32) -> u32 {
  return (x << n) | (x >> (32u - n));
}
fn FF(a : u32, b : u32, c : u32, d : u32, x : u32, s : u32, ac : u32) -> u32 {
  var res = a + F(b, c, d) + x + ac;
  res = rotateLeft(res, s);
  return res + b;
}
fn GG(a : u32, b : u32, c : u32, d : u32, x : u32, s : u32, ac : u32) -> u32 {
  var res = a + G(b, c, d) + x + ac;
  res = rotateLeft(res, s);
  return res + b;
}
fn HH(a : u32, b : u32, c : u32, d : u32, x : u32, s : u32, ac : u32) -> u32 {
  var res = a + H(b, c, d) + x + ac;
  res = rotateLeft(res, s);
  return res + b;
}
fn II(a : u32, b : u32, c : u32, d : u32, x : u32, s : u32, ac : u32) -> u32 {
  var res = a + I(b, c, d) + x + ac;
  res = rotateLeft(res, s);
  return res + b;
}

fn md5_transform(abcd : vec4<u32>, block : array<u32,16>) -> vec4<u32> {
  var a = abcd.x;
  var b = abcd.y;
  var c = abcd.z;
  var d = abcd.w;

  // Round 1
  a = FF(a,b,c,d,block[0], 7u, 0xd76aa478u);
  d = FF(d,a,b,c,block[1],12u, 0xe8c7b756u);
  c = FF(c,d,a,b,block[2],17u, 0x242070dbu);
  b = FF(b,c,d,a,block[3],22u, 0xc1bdceeeu);
  a = FF(a,b,c,d,block[4], 7u, 0xf57c0fafu);
  d = FF(d,a,b,c,block[5],12u, 0x4787c62au);
  c = FF(c,d,a,b,block[6],17u, 0xa8304613u);
  b = FF(b,c,d,a,block[7],22u, 0xfd469501u);
  a = FF(a,b,c,d,block[8], 7u, 0x698098d8u);
  d = FF(d,a,b,c,block[9],12u, 0x8b44f7afu);
  c = FF(c,d,a,b,block[10],17u, 0xffff5bb1u);
  b = FF(b,c,d,a,block[11],22u, 0x895cd7beu);
  a = FF(a,b,c,d,block[12], 7u, 0x6b901122u);
  d = FF(d,a,b,c,block[13],12u, 0xfd987193u);
  c = FF(c,d,a,b,block[14],17u, 0xa679438eu);
  b = FF(b,c,d,a,block[15],22u, 0x49b40821u);

  // Round 2
  a = GG(a,b,c,d,block[1], 5u, 0xf61e2562u);
  d = GG(d,a,b,c,block[6], 9u, 0xc040b340u);
  c = GG(c,d,a,b,block[11],14u,0x265e5a51u);
  b = GG(b,c,d,a,block[0],20u, 0xe9b6c7aau);
  a = GG(a,b,c,d,block[5], 5u, 0xd62f105du);
  d = GG(d,a,b,c,block[10],9u, 0x02441453u);
  c = GG(c,d,a,b,block[15],14u,0xd8a1e681u);
  b = GG(b,c,d,a,block[4],20u, 0xe7d3fbc8u);
  a = GG(a,b,c,d,block[9], 5u, 0x21e1cde6u);
  d = GG(d,a,b,c,block[14],9u, 0xc33707d6u);
  c = GG(c,d,a,b,block[3],14u, 0xf4d50d87u);
  b = GG(b,c,d,a,block[8],20u, 0x455a14edu);
  a = GG(a,b,c,d,block[13],5u, 0xa9e3e905u);
  d = GG(d,a,b,c,block[2], 9u, 0xfcefa3f8u);
  c = GG(c,d,a,b,block[7],14u, 0x676f02d9u);
  b = GG(b,c,d,a,block[12],20u, 0x8d2a4c8au);

  // Round 3
  a = HH(a,b,c,d,block[5], 4u, 0xfffa3942u);
  d = HH(d,a,b,c,block[8],11u, 0x8771f681u);
  c = HH(c,d,a,b,block[11],16u,0x6d9d6122u);
  b = HH(b,c,d,a,block[14],23u,0xfde5380cu);
  a = HH(a,b,c,d,block[1], 4u, 0xa4beea44u);
  d = HH(d,a,b,c,block[4],11u, 0x4bdecfa9u);
  c = HH(c,d,a,b,block[7],16u, 0xf6bb4b60u);
  b = HH(b,c,d,a,block[10],23u,0xbebfbc70u);
  a = HH(a,b,c,d,block[13],4u, 0x289b7ec6u);
  d = HH(d,a,b,c,block[0],11u, 0xeaa127fau);
  c = HH(c,d,a,b,block[3],16u, 0xd4ef3085u);
  b = HH(b,c,d,a,block[6],23u, 0x04881d05u);
  a = HH(a,b,c,d,block[9], 4u, 0xd9d4d039u);
  d = HH(d,a,b,c,block[12],11u,0xe6db99e5u);
  c = HH(c,d,a,b,block[15],16u,0x1fa27cf8u);
  b = HH(b,c,d,a,block[2], 23u, 0xc4ac5665u);

  // Round 4
  a = II(a,b,c,d,block[0],  6u, 0xf4292244u);
  d = II(d,a,b,c,block[7], 10u,0x432aff97u);
  c = II(c,d,a,b,block[14],15u,0xab9423a7u);
  b = II(b,c,d,a,block[5], 21u, 0xfc93a039u);
  a = II(a,b,c,d,block[12], 6u, 0x655b59c3u);
  d = II(d,a,b,c,block[3], 10u, 0x8f0ccc92u);
  c = II(c,d,a,b,block[10],15u,0xffeff47du);
  b = II(b,c,d,a,block[1], 21u, 0x85845dd1u);
  a = II(a,b,c,d,block[8],  6u, 0x6fa87e4fu);
  d = II(d,a,b,c,block[15],10u, 0xfe2ce6e0u);
  c = II(c,d,a,b,block[6], 15u, 0xa3014314u);
  b = II(b,c,d,a,block[13],21u, 0x4e0811a1u);
  a = II(a,b,c,d,block[4],  6u, 0xf7537e82u);
  d = II(d,a,b,c,block[11],10u, 0xbd3af235u);
  c = II(c,d,a,b,block[2], 15u, 0x2ad7d2bbu);
  b = II(b,c,d,a,block[9], 21u, 0xeb86d391u);

  a = a + abcd.x;
  b = b + abcd.y;
  c = c + abcd.z;
  d = d + abcd.w;

  return vec4<u32>(a,b,c,d);
}

fn md5_init() -> vec4<u32> {
  return vec4<u32>(0x67452301u, 0xEFCDAB89u, 0x98BADCFEu, 0x10325476u);
}

// -----------------------------------------------------------------------
// Build a single MD5 block: prefix + suffix
fn buildBlock(suffixId : u32) -> array<u32,16> {
  var block : array<u32,16>;
  for (var i = 0u; i < 16u; i++) {
    block[i] = 0u;
  }

  let pLen = config.prefixLength;
  let totalLen = config.totalLength;
  let sLen = totalLen - pLen;

  // 1) Copy prefix chars
  for (var i = 0u; i < pLen; i = i + 1u) {
    let bVal = prefixChars[i] & 0xFFu;
    let wIndex = i >> 2u;
    let shift = (i & 3u) * 8u;
    block[wIndex] = block[wIndex] | (bVal << shift);
  }

  // 2) Suffix expansion in base=charSetLength
  var idx = suffixId;
  for (var i = 0u; i < sLen; i = i + 1u) {
    let digit = idx % config.charSetLength;
    idx = idx / config.charSetLength;
    let bVal = sharedCharset[digit] & 0xFFu;

    let pos = pLen + i;
    let wIndex = pos >> 2u;
    let shift = (pos & 3u) * 8u;
    block[wIndex] = block[wIndex] | (bVal << shift);
  }

  // 3) MD5 padding
  let padPos = totalLen;
  if (padPos < 64u) {
    let padWordIndex = padPos >> 2u;
    let shift = (padPos & 3u) * 8u;
    block[padWordIndex] = block[padWordIndex] | (0x80u << shift);
  }
  // 4) length in bits
  block[14] = totalLen * 8u;

  return block;
}

fn md5_forSuffix(suffixId : u32) -> vec4<u32> {
  var state = md5_init();
  let block = buildBlock(suffixId);
  return md5_transform(state, block);
}

// -----------------------------------------------------------------------
// Kernel enumerates suffix IDs and checks for match
@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id) gid : vec3<u32>,
        @builtin(local_invocation_id) lid : vec3<u32>) {

  // Copy the charSet to shared memory
  for (var i = lid.x; i < config.charSetLength; i = i + 256u) {
    sharedCharset[i] = globalCharSet[i];
  }
  for (var j = lid.x + config.charSetLength; j < 256u; j = j + 256u) {
    sharedCharset[j] = 0u;
  }
  workgroupBarrier();

  let rowWidth = config.dispatchWidth * 256u; // threads in X
  let globalRow = config.rowStart + gid.y;
  let linearId = globalRow * rowWidth + gid.x;

  // If suffixId >= suffixRange, do nothing
  if (linearId >= config.suffixRange) {
    return;
  }

  // Compute MD5 for (prefix + suffix)
  let md5Val = md5_forSuffix(linearId);
  let expected = expectedBuffer.hash;
  if ((md5Val.x == expected[0]) &&
      (md5Val.y == expected[1]) &&
      (md5Val.z == expected[2]) &&
      (md5Val.w == expected[3])) {
    // If found, store the suffix ID
    atomicMinU32(linearId);
  }
}
`;

function md5HexToWordsLE(hexStr) {
  if (hexStr.length !== 32) {
    throw new Error("MD5 must be 32 hex chars.");
  }
  function parseLE(pos) {
    const b0 = parseInt(hexStr.substring(pos + 0, pos + 2), 16);
    const b1 = parseInt(hexStr.substring(pos + 2, pos + 4), 16);
    const b2 = parseInt(hexStr.substring(pos + 4, pos + 6), 16);
    const b3 = parseInt(hexStr.substring(pos + 6, pos + 8), 16);
    return (b0 | (b1 << 8) | (b2 << 16) | (b3 << 24)) >>> 0;
  }
  return [
    parseLE(0),
    parseLE(8),
    parseLE(16),
    parseLE(24),
  ];
}

async function crackMD5_prefixMask(hashHex, charSet, maxLen,
                                   dispatchWidth, threadsPerGroup, maxRowsPerDispatch,
                                   singlePassThreshold, minLen = 1) {
  checkWebGPU();
  
  let lastGpuTime = 0;
  
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) throw new Error("No WebGPU adapter found.");
  const device = await adapter.requestDevice();
  const queue = device.queue;

  const module = device.createShaderModule({ code: prefixMaskWGSL });
  const pipeline = device.createComputePipeline({
    layout: "auto",
    compute: { module, entryPoint: "main" },
  });

  const md5Words = md5HexToWordsLE(hashHex);
  const expectedData = new Uint32Array(md5Words);

  const charCodes = new Uint32Array(charSet.length);
  for (let i = 0; i < charSet.length; i++) {
    charCodes[i] = charSet.charCodeAt(i) & 0xff;
  }
  const charSetBuffer = device.createBuffer({
    size: charCodes.byteLength,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
  });
  queue.writeBuffer(charSetBuffer, 0, charCodes);

  const maxPrefixBytes = 64;
  const prefixBuffer = device.createBuffer({
    size: maxPrefixBytes * 4,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
  });

  const expectedBuffer = device.createBuffer({
    size: expectedData.byteLength,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
  });
  queue.writeBuffer(expectedBuffer, 0, expectedData);

  const configSize = 8 * 4;
  const configBuffer = device.createBuffer({
    size: configSize,
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST
  });

  const foundBuffer = device.createBuffer({
    size: 4,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC
  });

  const bindGroup = device.createBindGroup({
    layout: pipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: { buffer: charSetBuffer } },
      { binding: 1, resource: { buffer: prefixBuffer } },
      { binding: 2, resource: { buffer: expectedBuffer } },
      { binding: 3, resource: { buffer: configBuffer } },
      { binding: 4, resource: { buffer: foundBuffer } },
    ],
  });

  function resetFoundIndex() {
    queue.writeBuffer(foundBuffer, 0, new Uint32Array([0xffffffff]));
  }

  async function readFoundIndex() {
    const readback = device.createBuffer({
      size: 4,
      usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ
    });
    const enc = device.createCommandEncoder();
    enc.copyBufferToBuffer(foundBuffer, 0, readback, 0, 4);
    device.queue.submit([enc.finish()]);
    await readback.mapAsync(GPUMapMode.READ);
    const val = new DataView(readback.getMappedRange()).getUint32(0, true);
    readback.unmap();
    return val === 0xffffffff ? -1 : val;
  }

  function writeConfig({
    prefixLength, totalLength, suffixRange, charSetLength, dispatchWidth, rowStart
  }) {
    const data = new ArrayBuffer(configSize);
    const dv = new DataView(data);
    dv.setUint32(0, prefixLength, true);
    dv.setUint32(4, totalLength, true);
    dv.setUint32(8, suffixRange, true);
    dv.setUint32(12, charSetLength, true);
    dv.setUint32(16, dispatchWidth, true);
    dv.setUint32(20, rowStart, true);
    dv.setUint32(24, 0, true);
    dv.setUint32(28, 0, true);
    queue.writeBuffer(configBuffer, 0, data);
  }

  function writePrefix(prefixBytes) {
    const tmp = new Uint32Array(prefixBytes.length);
    for (let i = 0; i < prefixBytes.length; i++) {
      tmp[i] = prefixBytes[i] & 0xff;
    }
    queue.writeBuffer(prefixBuffer, 0, tmp);
  }

  function indexToString(idx, length, charSet) {
    let result = "";
    const base = BigInt(charSet.length);
    let bigIdx = BigInt(idx);
    for (let i = 0; i < length; i++) {
      const digit = Number(bigIdx % base);
      bigIdx = bigIdx / base;
      result += charSet[digit];
    }
    return result;
  }

  async function runOnePrefix(prefixBytes, prefixLen, totalLen) {
    writePrefix(prefixBytes);
    const suffixLen = totalLen - prefixLen;
    const suffixRange = Math.pow(charSet.length, suffixLen);

    resetFoundIndex();

    let rowStart = 0;
    const rowWidth = dispatchWidth * threadsPerGroup;
    let rowsNeeded = Math.ceil(suffixRange / rowWidth);

    const gpuStartTime = performance.now();
    
    const cmd = device.createCommandEncoder();
    const pass = cmd.beginComputePass();
    pass.setPipeline(pipeline);
    pass.setBindGroup(0, bindGroup);

    while (rowsNeeded > 0) {
      const subRows = Math.min(rowsNeeded, maxRowsPerDispatch);

      writeConfig({
        prefixLength: prefixLen,
        totalLength: totalLen,
        suffixRange,
        charSetLength: charSet.length,
        dispatchWidth,
        rowStart
      });

      pass.dispatchWorkgroups(dispatchWidth, subRows, 1);

      rowsNeeded -= subRows;
      rowStart += subRows;
      if (subRows === 0) break;
    }

    pass.end();
    device.queue.submit([cmd.finish()]);
    await device.queue.onSubmittedWorkDone();
    
    const gpuEndTime = performance.now();
    const gpuElapsedMs = gpuEndTime - gpuStartTime;

    lastGpuTime = gpuElapsedMs;
    
    return { 
      foundIndex: await readFoundIndex(),
      gpuTimeMs: gpuElapsedMs,
      hashesProcessed: suffixRange
    };
  }

  function getMaxSuffixLen(charSetLength) {
    const maxRange = 0xffffffffn;
    let sLen = 0;
    let combos = 1n;
    while (true) {
      let nextCombos = combos * BigInt(charSetLength);
      if (nextCombos > maxRange) {
        break;
      }
      combos = nextCombos;
      sLen++;
      if (sLen > 64) break;
    }
    return sLen;
  }

  const maxPossibleSuffixLen = getMaxSuffixLen(charSet.length);

  for (let length = minLen; length <= maxLen; length++) {
    const totalCombos = BigInt(charSet.length) ** BigInt(length);
    logMsg(`Length ${length}: total combos = ${totalCombos}`);

    if (totalCombos <= singlePassThreshold) {
      logMsg(`  Single GPU pass (<= threshold).`);
      const foundSuffix = await runOnePrefix([], 0, length);
      if (foundSuffix.foundIndex >= 0) {
        const pwd = indexToString(foundSuffix.foundIndex, length, charSet);
        logMsg(`FOUND match @ index=${foundSuffix.foundIndex}, password="${pwd}"`);
        return pwd;
      }
    } else {
      let suffixLen = Math.min(length, maxPossibleSuffixLen);
      if (suffixLen < 1) {
        logMsg(`  Cannot handle length ${length} with suffixLen < 1. Skipping...`);
        continue;
      }

      const prefixLen = length - suffixLen;
      const prefixSpace = Math.pow(charSet.length, prefixLen);
      logMsg(`  Splitting: prefixLen=${prefixLen}, suffixLen=${suffixLen}`);
      logMsg(`  prefixSpace = ${prefixSpace} (CPU enumeration)`);

      let lastTime = performance.now();
      let lastSuffixSpace = 0;
      
      for (let p = 0; p < prefixSpace; p++) {
        const prefixStr = indexToString(p, prefixLen, charSet);
        
        const prefixBytes = new Array(prefixLen);
        for (let i = 0; i < prefixLen; i++) {
          prefixBytes[i] = prefixStr.charCodeAt(i);
        }
        
        const result = await runOnePrefix(prefixBytes, prefixLen, length);
        
        const hashRateMH = (result.hashesProcessed / (result.gpuTimeMs / 1000) / 1000000).toFixed(2);
        
        logMsg(`    Checking prefix #${p} of ${prefixSpace}: "${prefixStr}" (length=${length}) - ${hashRateMH} MH/s`);
        
        if (result.foundIndex >= 0) {
          const suffixStr = indexToString(result.foundIndex, suffixLen, charSet);
          const fullPwd = prefixStr + suffixStr;
          logMsg(`FOUND match: prefixIdx=${p}, suffixIdx=${result.foundIndex}, password="${fullPwd}"`);
          return fullPwd;
        }
      }
    }
  }

  logMsg("No match up to maxLen.");
  return null;
}

document.getElementById("startBtn").addEventListener("click", async () => {
  const logArea = document.getElementById("logArea");
  logArea.value = "";

  try {
    const hash = document.getElementById("hashInput").value.trim();
    const cs = document.getElementById("charSetInput").value;
    const ml = parseInt(document.getElementById("maxLenInput").value);
    const minl = parseInt(document.getElementById("minLenInput").value);
    const dw = 256;
    const tpg = 256;
    const my = 65535;

    await crackMD5_prefixMask(hash, cs, ml, dw, tpg, my, BigInt(4294967296), minl);
  } catch (err) {
    logMsg("ERROR: " + err);
    console.error(err);
  }
});
</script>
